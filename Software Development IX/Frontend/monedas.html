<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra tus Fichas</title>
    <link rel="stylesheet" href="./css/monedas.css">
    <script src="./js/monedas.js" defer></script>
</head>
<body>
    <div class="container">
        <h1 class="title">compra tus fichas</h1>
        
        <div class="packages-grid">
            <!-- Paquete 200 monedas -->
            <div class="package-card" id="option1">
                <div class="price">$0.99</div>
                <div class="coin-icon">
                    <div class="coin-stack">🪙</div>
                </div>
                <div class="amount">200</div>
                <div class="currency">monedas</div>
            </div>

            <!-- Paquete 1,000 monedas -->
            <div class="package-card" id="option2">
                <div class="price">$4.99</div>
                <div class="coin-icon">
                    <div class="coin-stack">🪙</div>
                </div>
                <div class="amount">1,000</div>
                <div class="currency">monedas</div>
            </div>

            <!-- Paquete 3,000 monedas -->
            <div class="package-card" id="option3">
                <div class="price">$19.99</div>
                <div class="coin-icon">
                    <div class="coin-stack">🪙</div>
                </div>
                <div class="amount">3,000</div>
                <div class="currency">monedas</div>
            </div>

            <!-- Paquete 8,000 monedas -->
            <div class="package-card" id="option4">
                <div class="price">$49.99</div>
                <div class="coin-icon">
                    <div class="coin-stack">🪙</div>
                </div>
                <div class="amount">8,000</div>
                <div class="currency">monedas</div>
            </div>
        </div>
    </div>
</body>
</html>
